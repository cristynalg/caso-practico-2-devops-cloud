---
- name: Desplegar aplicación web Nginx con Podman
  hosts: vm_podman
  become: true

  tasks:
    - name: Iniciar sesión en Azure Container Registry
      containers.podman.podman_login:
        registry: "{{ acr_login_server }}"
        username: "{{ acr_username }}"
        password: "{{ acr_password }}"

    - name: Descargar imagen web desde ACR
      containers.podman.podman_image:
        name: "{{ acr_login_server }}/{{ acr_image_name }}"
        tag: "{{ acr_image_tag }}"
        pull: true

    - name: Eliminar contenedor anterior si existe
      containers.podman.podman_container:
        name: "{{ web_container_name }}"
        state: absent

    - name: Ejecutar contenedor web con HTTPS
      containers.podman.podman_container:
        name: "{{ web_container_name }}"
        image: "{{ acr_login_server }}/{{ acr_image_name }}:{{ acr_image_tag }}"
        state: started
        restart_policy: always
        ports:
          - "{{ web_https_port }}:443"
